---
- name: Create node_exporter group
  ansible.builtin.group:
    name: node_exporter
    system: true
  become: true
  become_user: root

- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    group: node_exporter
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  become: true
  become_user: root

- name: Download and extract node_exporter
  ansible.builtin.unarchive:
    remote_src: true
    src: https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_os }}-{{ node_exporter_arch }}.tar.gz
    dest: /tmp
    creates: /tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_os }}-{{ node_exporter_arch }}/node_exporter
    owner: root
    group: root
  become: true
  become_user: root

- name: Copy node_exporter binary
  ansible.builtin.copy:
    remote_src: true
    src: /tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_os }}-{{ node_exporter_arch }}/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    owner: root
    group: root
  notify: restart node_exporter
  become: true
  become_user: root

- name: Create node_exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    owner: root
    group: root
  notify: restart node_exporter
  become: true
  become_user: root

- name: Start and enable node_exporter
  ansible.builtin.systemd_service:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true
  become_user: root
