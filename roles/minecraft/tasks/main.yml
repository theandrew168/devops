---

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - default-jre-headless
    update_cache: true
  become: true
  become_user: root

- name: Create minecraft user
  ansible.builtin.user:
    name: minecraft
  become: true
  become_user: root

- name: Setup permissions for data directory
  ansible.builtin.file:
    path: "{{ minecraft_data_dir }}"
    mode: "0700"
    owner: minecraft
    group: minecraft
    state: directory
  when: minecraft_data_dir is truthy
  become: true
  become_user: root

- name: Download server jar
  ansible.builtin.get_url:
    url: https://files.betacraft.uk/server-archive/{{ minecraft_era }}/{{ minecraft_version }}.jar
    dest: "{{ minecraft_data_dir }}/{{ minecraft_version }}.jar"
    mode: "0640"
    owner: minecraft
    group: minecraft
  become: true
  become_user: root

- name: Setup config file
  ansible.builtin.copy:
    content: "{{ minecraft_config }}"
    dest: "{{ minecraft_data_dir }}/server.properties"
    mode: "0640"
    owner: minecraft
    group: minecraft
  notify: restart minecraft
  become: true
  become_user: root

- name: Setup allowed users file
  ansible.builtin.copy:
    content: "{{ minecraft_users }}"
    dest: "{{ minecraft_data_dir }}/white-list.txt"
    mode: "0640"
    owner: minecraft
    group: minecraft
  notify: restart minecraft
  become: true
  become_user: root

- name: Limit login attempts (all IP addresses)
  community.general.ufw:
    rule: limit
    port: "25565"
    proto: tcp
  when: minecraft_allowed_ips | length == 0
  become: true
  become_user: root

- name: Limit login attempts (allowed IP addresses)
  community.general.ufw:
    rule: limit
    src: "{{ item }}"
    port: "25565"
    proto: tcp
  with_items: "{{ minecraft_allowed_ips }}"
  no_log: true
  become: true
  become_user: root

- name: Setup systemd service file
  ansible.builtin.template:
    src: minecraft.service.j2
    dest: /etc/systemd/system/minecraft.service
    mode: "0644"
  notify: restart minecraft
  become: true
  become_user: root

- name: Start and enable minecraft
  ansible.builtin.systemd_service:
    name: minecraft
    state: started
    enabled: true
    daemon_reload: true
  become: true
  become_user: root
