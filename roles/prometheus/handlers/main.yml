---
- name: restart prometheus
  ansible.builtin.systemd_service:
    name: prometheus
    state: restarted
    daemon_reload: true
  become: true
  become_user: root

- name: reload prometheus
  ansible.builtin.systemd_service:
    name: prometheus
    state: reloaded
    daemon_reload: true
  become: true
  become_user: root
