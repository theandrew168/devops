---
- name: Create prometheus group
  ansible.builtin.group:
    name: prometheus
    system: true
  become: true
  become_user: root

- name: Create prometheus user
  ansible.builtin.user:
    name: prometheus
    group: prometheus
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  become: true
  become_user: root

- name: Setup permissions for data directory
  ansible.builtin.file:
    path: "{{ prometheus_data_directory }}"
    mode: "0700"
    owner: prometheus
    group: prometheus
    state: directory
  become: true
  become_user: root

- name: Download and extract prometheus
  ansible.builtin.unarchive:
    remote_src: true
    src: https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.{{ prometheus_os }}-{{ prometheus_arch }}.tar.gz
    dest: /tmp
    creates: /tmp/prometheus-{{ prometheus_version }}.{{ prometheus_os }}-{{ prometheus_arch }}/prometheus
    owner: root
    group: root
  become: true
  become_user: root

- name: Copy prometheus binary
  ansible.builtin.copy:
    remote_src: true
    src: /tmp/prometheus-{{ prometheus_version }}.{{ prometheus_os }}-{{ prometheus_arch }}/prometheus
    dest: /usr/local/bin/prometheus
    mode: "0755"
    owner: root
    group: root
  notify: restart prometheus
  become: true
  become_user: root

- name: Setup prometheus config file
  ansible.builtin.copy:
    content: "{{ prometheus_config }}"
    dest: /etc/prometheus.yml
    mode: "0640"
    owner: root
    group: prometheus
  notify: reload prometheus
  become: true
  become_user: root

- name: Create prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
    owner: root
    group: root
  notify: restart prometheus
  become: true
  become_user: root

- name: Start and enable prometheus
  ansible.builtin.systemd_service:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true
  become: true
  become_user: root
