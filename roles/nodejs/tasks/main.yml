- name: Setup nodejs apt repo key
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
  become: true
  become_user: root

- name: Setup nodejs apt repo
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
  with_items:
    - "deb https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
  become: true
  become_user: root

- name: Install nodejs
  ansible.builtin.apt:
    name: nodejs
    update_cache: true
  become: true
  become_user: root
