---
- name: Create pg2s3 group
  ansible.builtin.group:
    name: pg2s3
    system: true
  become: true
  become_user: root

- name: Create pg2s3 user
  ansible.builtin.user:
    name: pg2s3
    group: pg2s3
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  become: true
  become_user: root

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - postgresql-client-{{ pg2s3_postgresql_client_version }}
      - postgresql-client-common
    update_cache: true
  become: true
  become_user: root

- name: Install pg2s3 (latest)
  ansible.builtin.apt:
    deb: https://github.com/theandrew168/pg2s3/releases/latest/download/pg2s3_{{ pg2s3_os }}_{{ pg2s3_arch }}.deb
    update_cache: true
  when: pg2s3_version == "latest"
  notify: restart pg2s3
  become: true
  become_user: root

- name: Install pg2s3 (version)
  ansible.builtin.apt:
    deb: https://github.com/theandrew168/pg2s3/releases/download/v{{ pg2s3_version }}/pg2s3_{{ pg2s3_os }}_{{ pg2s3_arch }}.deb
    update_cache: true
  when: pg2s3_version != "latest"
  notify: restart pg2s3
  become: true
  become_user: root

- name: Setup pg2s3 config file
  ansible.builtin.copy:
    content: "{{ pg2s3_config }}"
    dest: /etc/pg2s3.conf
    mode: "0640"
    owner: root
    group: pg2s3
  notify: restart pg2s3
  become: true
  become_user: root

- name: Add pg2s3 user to the dbuser group
  ansible.builtin.user:
    name: pg2s3
    groups: dbuser
    append: true
  when: postgresql_unix_domain_socket_only
  become: true
  become_user: root

- name: Start and enable pg2s3
  ansible.builtin.systemd_service:
    name: pg2s3
    state: started
    enabled: true
    daemon_reload: true
  become: true
  become_user: root
