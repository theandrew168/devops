- name: Create swapfile
  ansible.builtin.command:
    cmd: fallocate -l 1G /swapfile
    creates: /swapfile
  register: create_swapfile
  become: true
  become_user: root

- name: Set swapfile permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  become: true
  become_user: root

- name: Initialize swapfile
  ansible.builtin.command:
    cmd: mkswap /swapfile
  when: create_swapfile is changed
  become: true
  become_user: root

- name: Enable swapfile
  ansible.builtin.command:
    cmd: swapon /swapfile
  when: create_swapfile is changed
  become: true
  become_user: root

- name: Add swapfile to fstab
  ansible.posix.mount:
    name: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present
  become: true
  become_user: root

- name: Configure swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: 10
  become: true
  become_user: root

- name: Configure vfs_cache_pressure
  ansible.posix.sysctl:
    name: vm.vfs_cache_pressure
    value: 50
  become: true
  become_user: root
