- name: Set hostname (transient)
  ansible.builtin.hostname:
    name: "{{ server_hostname }}"
  when: server_hostname is truthy
  become: true
  become_user: root

- name: Set hostname (/etc/hosts)
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    mode: "0644"
  when: server_hostname is truthy
  become: true
  become_user: root

- name: Set hostname (/etc/hostname)
  ansible.builtin.template:
    src: hostname.j2
    dest: /etc/hostname
    mode: "0644"
  when: server_hostname is truthy
  become: true
  become_user: root
